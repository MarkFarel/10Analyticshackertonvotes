<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCORE OPS · Top N Leaderboard</title>
<style>
  :root{
    --bg:#0A0C10;
    --panel:#10141A;
    --panel-2:#0D1116;
    --border:#1B222B;
    --border-soft:#161C24;
    --live:#35D4AE;
    --live-dim:#1E6F5C;
    --warn:#E8A33D;
    --warn-dim:#7A5420;
    --gold:#D4AF37;
    --text:#E8EDF2;
    --text-muted:#6B7684;
    --text-dim:#454E59;
    --ec1:#35D4AE; --ec2:#4FA8D8; --ec3:#B892E8; --ec4:#E8C24F; --ec5:#E88F6B;
    --mono: ui-monospace, "SF Mono", "Cascadia Code", "JetBrains Mono", Menlo, Consolas, monospace;
    --sans: ui-sans-serif, -apple-system, "Segoe UI", Inter, Roboto, sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--sans);}
  body{
    min-height:100vh;
    background-image:
      radial-gradient(circle at 15% 0%, rgba(53,212,174,0.05), transparent 40%),
      radial-gradient(circle at 85% 100%, rgba(53,212,174,0.04), transparent 40%);
  }
  .wrap{max-width:1100px;margin:0 auto;padding:20px 20px 60px;}

  .topbar{
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 18px;background:var(--panel);border:1px solid var(--border);
    border-radius:10px;margin-bottom:14px;flex-wrap:wrap;gap:12px;
  }
  .brand{display:flex;align-items:center;gap:10px;}
  .brand-title{font-family:var(--mono);font-size:13px;letter-spacing:2px;font-weight:600;color:var(--text);}
  .live-dot{width:8px;height:8px;border-radius:50%;background:var(--live);box-shadow:0 0 0 0 rgba(53,212,174,0.7);animation:pulse 1.8s infinite;}
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(53,212,174,0.55);}
    70%{box-shadow:0 0 0 8px rgba(53,212,174,0);}
    100%{box-shadow:0 0 0 0 rgba(53,212,174,0);}
  }
  .live-label{font-family:var(--mono);font-size:11px;color:var(--live);letter-spacing:1px;}
  .refresh-note{font-family:var(--mono);font-size:11px;color:var(--text-dim);}

  .filterbar{
    display:flex;align-items:center;gap:22px;flex-wrap:wrap;
    background:var(--panel);border:1px solid var(--border);border-radius:10px;
    padding:12px 18px;margin-bottom:14px;
  }
  .filter-group{display:flex;align-items:center;gap:10px;}
  .filter-label{font-family:var(--mono);font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);white-space:nowrap;}
  .filter-value{font-family:var(--mono);font-size:11px;color:var(--live);min-width:20px;}
  input[type=range]{-webkit-appearance:none;width:130px;height:4px;border-radius:2px;background:var(--border-soft);outline:none;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--live);cursor:pointer;box-shadow:0 0 0 3px rgba(53,212,174,0.15);}
  input[type=range]::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:var(--live);cursor:pointer;border:none;}

  .track-dropdown{position:relative;}
  .track-btn{
    font-family:var(--mono);font-size:11px;color:var(--text);background:var(--panel-2);
    border:1px solid var(--border);border-radius:6px;padding:7px 12px;cursor:pointer;
    display:flex;align-items:center;gap:8px;
  }
  .track-btn:hover{border-color:var(--live-dim);}
  .track-panel{
    display:none;position:absolute;top:calc(100% + 6px);left:0;z-index:20;
    background:var(--panel-2);border:1px solid var(--border);border-radius:8px;
    padding:10px;width:220px;max-height:260px;overflow-y:auto;
    box-shadow:0 8px 24px rgba(0,0,0,0.4);
  }
  .track-panel.open{display:block;}
  .track-panel-actions{display:flex;gap:8px;margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid var(--border-soft);}
  .mini-btn{font-family:var(--mono);font-size:10px;color:var(--text-muted);background:none;border:1px solid var(--border);border-radius:4px;padding:4px 8px;cursor:pointer;}
  .mini-btn:hover{color:var(--live);border-color:var(--live-dim);}
  .track-option{display:flex;align-items:center;gap:8px;padding:5px 2px;font-family:var(--mono);font-size:12px;cursor:pointer;}
  .track-option input{cursor:pointer;accent-color:var(--live);}
  .track-option span.cnt{margin-left:auto;color:var(--text-dim);font-size:10px;}

  .stat-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px;}
  @media(max-width:820px){.stat-strip{grid-template-columns:repeat(2,1fr);}}
  .stat-card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:14px 16px;}
  .stat-card .v{font-family:var(--mono);font-size:22px;font-weight:700;color:var(--text);}
  .stat-card .k{font-size:10px;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase;margin-top:2px;}

  .panel{background:var(--panel);border:1px solid var(--border);border-radius:10px;overflow:visible;}
  .panel-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border-soft);}
  .panel-head h2{font-family:var(--mono);font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);margin:0;font-weight:600;}
  .panel-head .count{font-family:var(--mono);font-size:11px;color:var(--text-dim);}
  .panel-body{padding:10px 16px 16px;position:relative;}

  .lb-row{
    position:relative;
    display:grid;grid-template-columns:36px 1fr auto;align-items:center;gap:12px;
    padding:12px 4px;border-bottom:1px solid var(--border-soft);
    transition:transform 0.5s cubic-bezier(.2,.8,.2,1), background 0.3s;
    background:transparent;
    will-change:transform;
  }
  .lb-row:last-child{border-bottom:none;}
  .lb-row.flash{background:rgba(53,212,174,0.06);}
  .lb-rank{font-family:var(--mono);font-size:15px;color:var(--text-dim);text-align:center;}
  .lb-rank.gold{color:var(--gold);font-weight:700;}
  .lb-rank.silver{color:#C0C6CC;font-weight:700;}
  .lb-rank.bronze{color:#B87333;font-weight:700;}
  .lb-main{min-width:0;}
  .lb-team{font-family:var(--mono);font-size:13px;color:var(--text);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .lb-meta{font-family:var(--mono);font-size:11px;color:var(--text-muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .lb-track-badge{
    display:inline-block;font-size:9px;letter-spacing:0.5px;text-transform:uppercase;
    background:var(--panel-2);border:1px solid var(--border);color:var(--text-muted);
    padding:1px 6px;border-radius:4px;margin-right:6px;
  }
  .ec-bars{display:flex;gap:2px;margin-top:6px;height:4px;}
  .ec-seg{flex:1;border-radius:2px;background:var(--border-soft);overflow:hidden;position:relative;}
  .ec-seg-fill{position:absolute;left:0;top:0;bottom:0;border-radius:2px;}

  .lb-right{display:flex;align-items:center;gap:10px;text-align:right;}
  .lb-score{font-family:var(--mono);font-size:17px;font-weight:700;color:var(--live);}
  .lb-score-label{font-family:var(--mono);font-size:9px;color:var(--text-dim);}
  .lb-move{font-family:var(--mono);font-size:11px;font-weight:600;min-width:28px;text-align:center;}
  .lb-move.up{color:var(--live);}
  .lb-move.down{color:var(--warn);}
  .lb-move.same{color:var(--text-dim);}
  .lb-move.new{color:var(--gold);}

  .empty{color:var(--text-dim);font-family:var(--mono);font-size:12px;padding:20px 0;text-align:center;}
  .error-banner{background:#2A1414;border:1px solid #4A2020;color:#E89090;padding:12px 16px;border-radius:8px;font-family:var(--mono);font-size:12px;margin-bottom:16px;}

  ::-webkit-scrollbar{width:6px;}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <div class="brand">
      <div class="live-dot"></div>
      <div class="brand-title">SCORE OPS</div>
      <div class="live-label">LIVE</div>
    </div>
    <div class="refresh-note" id="refresh-note">syncing…</div>
  </div>

  <div id="error-slot"></div>

  <div class="filterbar">
    <div class="filter-group track-dropdown">
      <span class="filter-label">Track</span>
      <button class="track-btn" id="track-btn" type="button">
        <span id="track-btn-label">All tracks</span>
        <span>▾</span>
      </button>
      <div class="track-panel" id="track-panel">
        <div class="track-panel-actions">
          <button class="mini-btn" id="track-all">All</button>
          <button class="mini-btn" id="track-clear">Clear</button>
        </div>
        <div id="track-options"></div>
      </div>
    </div>
    <div class="filter-group">
      <span class="filter-label">Top N</span>
      <input type="range" id="slider-n" min="3" max="50" value="10">
      <span class="filter-value" id="slider-n-val">10</span>
    </div>
  </div>

  <div class="stat-strip">
    <div class="stat-card"><div class="v" id="kpi-teams">—</div><div class="k">Teams Scored</div></div>
    <div class="stat-card"><div class="v" id="kpi-avg">—</div><div class="k">Avg Total Score</div></div>
    <div class="stat-card"><div class="v" id="kpi-top">—</div><div class="k">Highest Score</div></div>
    <div class="stat-card"><div class="v" id="kpi-spread">—</div><div class="k">Score Spread</div></div>
  </div>

  <div class="panel">
    <div class="panel-head"><h2>Top N · Overall Ranking</h2><span class="count" id="lb-count"></span></div>
    <div class="panel-body" id="leaderboard"><div class="empty">Loading…</div></div>
  </div>

</div>

<script>
const SHEET_ID = "1ELq5Cl1gEzt5jrqeUlxmOHCzl2mvIXUlLfeqIjRiGu4";
const GID = "890242629";
const GVIZ_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${GID}`;
const REFRESH_MS = 12000;

let countdown = REFRESH_MS / 1000;
let selectedTracks = null; // null = all
let topN = 10;
let previousRanks = new Map(); // team_id -> rank (1-indexed) from last render
let previousTop = new Map();   // team_id -> bounding rect top, for FLIP animation

function fmtNum(n){ return Number(n).toLocaleString("en-US", {maximumFractionDigits:1}); }

async function fetchSheet(){
  const res = await fetch(GVIZ_URL, {cache:"no-store"});
  if (!res.ok) throw new Error("HTTP " + res.status);
  const text = await res.text();
  const jsonStart = text.indexOf("{");
  const jsonEnd = text.lastIndexOf("}");
  const json = JSON.parse(text.slice(jsonStart, jsonEnd+1));
  const cols = json.table.cols.map(c => (c.label || c.id || "").trim().toLowerCase());
  const rows = json.table.rows.map(r => {
    const obj = {};
    r.c.forEach((cell, i) => { obj[cols[i]] = cell ? cell.v : null; });
    return obj;
  });
  return rows;
}

function num(v){
  const n = Number(v);
  return isNaN(n) ? 0 : n;
}

function getAllTracks(rows){
  const counts = new Map();
  rows.forEach(r => {
    const t = (r.track || "Unspecified").toString().trim() || "Unspecified";
    counts.set(t, (counts.get(t)||0) + 1);
  });
  return Array.from(counts.entries()).sort((a,b) => b[1]-a[1]);
}

function processRows(rows){
  const valid = rows.filter(r => r.team_id != null && r.team_id !== "");
  const scoped = selectedTracks
    ? valid.filter(r => selectedTracks.has((r.track || "Unspecified").toString().trim() || "Unspecified"))
    : valid;

  const teams = scoped.map(r => {
    const ec = [
      num(r["ec 1 (20%)"]),
      num(r["ec 2 (20%)"]),
      num(r["ec 3 (20%)"]),
      num(r["ec 4 (20%)"]),
      num(r["ec 5 (20%)"])
    ];
    const ecSum = ec.reduce((s,v)=>s+v,0);
    const total = r["total scores (100)"] != null && r["total scores (100)"] !== ""
      ? num(r["total scores (100)"])
      : ecSum;
    return {
      teamId: r.team_id,
      projectName: r.project_name || "Untitled project",
      teamName: r.team_name || ("Team " + r.team_id),
      track: (r.track || "Unspecified").toString().trim() || "Unspecified",
      ec,
      total
    };
  });

  teams.sort((a,b) => b.total - a.total);

  const totals = teams.map(t => t.total);
  const avg = totals.length ? totals.reduce((s,v)=>s+v,0) / totals.length : 0;
  const max = totals.length ? Math.max(...totals) : 0;
  const min = totals.length ? Math.min(...totals) : 0;

  return {
    teams,
    teamCount: teams.length,
    avgScore: avg,
    topScore: max,
    scoreSpread: max - min
  };
}

function renderTrackOptions(allTracks){
  const optsEl = document.getElementById("track-options");
  optsEl.innerHTML = allTracks.map(([track, count]) => {
    const checked = selectedTracks === null || selectedTracks.has(track);
    return `
      <label class="track-option">
        <input type="checkbox" data-track="${track}" ${checked ? "checked" : ""}>
        <span>${track}</span>
        <span class="cnt">${count}</span>
      </label>
    `;
  }).join("");

  optsEl.querySelectorAll("input[type=checkbox]").forEach(cb => {
    cb.addEventListener("change", () => {
      const all = allTracks.map(t => t[0]);
      const boxes = Array.from(optsEl.querySelectorAll("input[type=checkbox]"));
      const checkedList = boxes.filter(b => b.checked).map(b => b.dataset.track);
      selectedTracks = checkedList.length === all.length ? null : new Set(checkedList);
      updateTrackBtnLabel(all.length);
      renderAll();
    });
  });
}

function updateTrackBtnLabel(totalCount){
  const label = document.getElementById("track-btn-label");
  if (selectedTracks === null) label.textContent = "All tracks";
  else if (selectedTracks.size === 0) label.textContent = "None selected";
  else label.textContent = selectedTracks.size + " of " + totalCount + " selected";
}

let latestRows = [];

function ecColor(i){
  return ["var(--ec1)","var(--ec2)","var(--ec3)","var(--ec4)","var(--ec5)"][i];
}

function render(data){
  document.getElementById("kpi-teams").textContent = fmtNum(data.teamCount);
  document.getElementById("kpi-avg").textContent = fmtNum(data.avgScore);
  document.getElementById("kpi-top").textContent = fmtNum(data.topScore);
  document.getElementById("kpi-spread").textContent = fmtNum(data.scoreSpread);

  const lb = document.getElementById("leaderboard");
  document.getElementById("lb-count").textContent = data.teamCount + " total teams";

  const shown = data.teams.slice(0, topN);

  if (!shown.length) {
    lb.innerHTML = '<div class="empty">No scored teams for this filter</div>';
    previousRanks.clear();
    return;
  }

  // --- FLIP step 1: capture old positions of currently rendered rows ---
  const oldRects = new Map();
  lb.querySelectorAll(".lb-row").forEach(el => {
    oldRects.set(el.dataset.teamId, el.getBoundingClientRect().top);
  });

  const newRanks = new Map();
  shown.forEach((t, i) => newRanks.set(String(t.teamId), i+1));

  lb.innerHTML = shown.map((t, i) => {
    const rank = i+1;
    const rankClass = rank===1 ? "gold" : rank===2 ? "silver" : rank===3 ? "bronze" : "";
    const prevRank = previousRanks.get(String(t.teamId));
    let moveHtml;
    if (prevRank === undefined) {
      moveHtml = `<span class="lb-move new">NEW</span>`;
    } else if (prevRank > rank) {
      moveHtml = `<span class="lb-move up">▲${prevRank - rank}</span>`;
    } else if (prevRank < rank) {
      moveHtml = `<span class="lb-move down">▼${rank - prevRank}</span>`;
    } else {
      moveHtml = `<span class="lb-move same">–</span>`;
    }

    const maxEc = 20;
    const ecBars = t.ec.map((v, idx) => {
      const pct = Math.max(0, Math.min(100, (v/maxEc)*100));
      return `<div class="ec-seg"><div class="ec-seg-fill" style="width:${pct}%;background:${ecColor(idx)}"></div></div>`;
    }).join("");

    return `
      <div class="lb-row" data-team-id="${t.teamId}">
        <div class="lb-rank ${rankClass}">${rank}</div>
        <div class="lb-main">
          <div class="lb-team">${t.projectName} <span style="color:var(--text-muted);font-weight:400;">— ${t.teamName}</span></div>
          <div class="lb-meta"><span class="lb-track-badge">${t.track}</span>ID #${t.teamId}</div>
          <div class="ec-bars">${ecBars}</div>
        </div>
        <div class="lb-right">
          ${moveHtml}
          <div>
            <div class="lb-score">${fmtNum(t.total)}</div>
            <div class="lb-score-label">/ 100</div>
          </div>
        </div>
      </div>
    `;
  }).join("");

  // --- FLIP step 2: measure new positions, invert, then play ---
  const rows = Array.from(lb.querySelectorAll(".lb-row"));
  rows.forEach(el => {
    const id = el.dataset.teamId;
    const oldTop = oldRects.get(id);
    if (oldTop !== undefined) {
      const newTop = el.getBoundingClientRect().top;
      const delta = oldTop - newTop;
      if (delta !== 0) {
        el.style.transition = "none";
        el.style.transform = `translateY(${delta}px)`;
        requestAnimationFrame(() => {
          el.style.transition = "transform 0.5s cubic-bezier(.2,.8,.2,1)";
          el.style.transform = "translateY(0)";
        });
      }
    } else {
      el.classList.add("flash");
      setTimeout(() => el.classList.remove("flash"), 900);
    }
  });

  previousRanks = newRanks;
}

function renderAll(){
  if (!latestRows.length) return;
  const data = processRows(latestRows);
  render(data);
}

function showError(msg){
  document.getElementById("error-slot").innerHTML =
    `<div class="error-banner">Couldn't load sheet data: ${msg}. Retrying automatically…</div>`;
}
function clearError(){ document.getElementById("error-slot").innerHTML = ""; }

async function fullRefresh(){
  try {
    const rows = await fetchSheet();
    latestRows = rows;
    const validForTracks = rows.filter(r => r.team_id != null && r.team_id !== "");
    const allTracks = getAllTracks(validForTracks);
    renderTrackOptions(allTracks);
    updateTrackBtnLabel(allTracks.length);
    renderAll();
    clearError();
  } catch(e) {
    showError(e.message || "unknown error");
  }
  countdown = REFRESH_MS / 1000;
}

function tickCountdown(){
  countdown -= 1;
  document.getElementById("refresh-note").textContent =
    countdown <= 0 ? "syncing…" : "next sync in " + countdown + "s";
}

document.getElementById("track-btn").addEventListener("click", (e) => {
  document.getElementById("track-panel").classList.toggle("open");
  e.stopPropagation();
});
document.addEventListener("click", (e) => {
  const panel = document.getElementById("track-panel");
  if (!panel.contains(e.target) && e.target.id !== "track-btn") panel.classList.remove("open");
});
document.getElementById("track-all").addEventListener("click", () => {
  selectedTracks = null;
  const validForTracks = latestRows.filter(r => r.team_id != null && r.team_id !== "");
  const allTracks = getAllTracks(validForTracks);
  renderTrackOptions(allTracks);
  updateTrackBtnLabel(allTracks.length);
  renderAll();
});
document.getElementById("track-clear").addEventListener("click", () => {
  selectedTracks = new Set();
  const validForTracks = latestRows.filter(r => r.team_id != null && r.team_id !== "");
  const allTracks = getAllTracks(validForTracks);
  renderTrackOptions(allTracks);
  updateTrackBtnLabel(allTracks.length);
  renderAll();
});
document.getElementById("slider-n").addEventListener("input", (e) => {
  topN = Number(e.target.value);
  document.getElementById("slider-n-val").textContent = topN;
  renderAll();
});

fullRefresh();
setInterval(fullRefresh, REFRESH_MS);
setInterval(tickCountdown, 1000);
</script>
</body>
</html>
